            --wait \
            --timeout 300s
          echo "Notarization complete"

      - name: Staple DMG (x64)
        run: |
          set -euo pipefail
          xcrun stapler staple "output/XSLEditor-${APP_VERSION}-x64.dmg"
          echo "Staple complete"

      - name: Verify Gatekeeper acceptance (informational, x64)
        run: |
          # spctl result on CI runner may differ from end-user machine; treat as informational only
          spctl -a -v --type install "output/XSLEditor-${APP_VERSION}-x64.dmg" 2>&1 || true
          echo "Gatekeeper check complete (informational)"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: dmg-x64
          path: output/XSLEditor-*-x64.dmg

      - name: Delete keychain
        if: always()
        run: security delete-keychain build.keychain || true

  package-windows:
    needs: build-jar
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.build-jar.outputs.app-version }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: liberica
          java-version: '21'
          java-package: jdk+fx

      - uses: actions/download-artifact@v8.0.1
        with:
          name: fat-jar
          path: dist/

      - name: Add WiX to PATH
        shell: bash
        run: echo "${WIX}bin" >> $GITHUB_PATH

      - name: Generate icon.ico
        shell: pwsh
        run: |
          magick convert `
            src/main/resources/ch/ti/gagi/xsleditor/icon.png `
            -define icon:auto-resize=256,128,64,48,32,16 `
            src/main/resources/ch/ti/gagi/xsleditor/icon.ico

      - name: Strip pre-release suffix for --app-version
        shell: bash
        run: |
          VERSION_CLEAN=$(echo "$APP_VERSION" | sed 's/-.*//')
          echo "VERSION_CLEAN=$VERSION_CLEAN" >> $GITHUB_ENV

      - name: jpackage app-image
        shell: bash
        run: |
          mkdir -p output
          jpackage \
            --type app-image \
            --name XSLEditor \
            --app-version "$VERSION_CLEAN" \
            --input dist/ \
            --main-jar "xsleditor-${APP_VERSION}.jar" \
            --main-class ch.ti.gagi.xsleditor.Launcher \
            --icon src/main/resources/ch/ti/gagi/xsleditor/icon.ico \
            --dest output/

      - name: jpackage MSI
        shell: bash
        run: |
          jpackage \
            --type msi \
            --name XSLEditor \
            --app-version "$VERSION_CLEAN" \
            --app-image output/XSLEditor \
            --dest output/ \
            --win-dir-chooser \
            --win-menu \
            --win-shortcut

      - name: Create portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path output/XSLEditor `
            -DestinationPath "output/XSLEditor-${{ env.APP_VERSION }}-portable.zip"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-msi
          path: output/XSLEditor-*.msi

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-zip
          path: output/XSLEditor-*-portable.zip

  release:
    needs: [build-jar, package-macos-arm, package-macos-x64, package-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: '*'
          merge-multiple: false
          path: release-assets/

      - uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
