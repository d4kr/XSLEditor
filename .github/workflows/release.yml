# =============================================================================
# Required GitHub Actions Secrets
# =============================================================================
# Configure these secrets at:
# GitHub → Settings → Secrets and variables → Actions → New repository secret
#
# ── Phase 21: macOS Signing (used in package-macos-arm and package-macos-x64) ──
#
# MACOS_CERTIFICATE
#   Base64-encoded Developer ID Application certificate (.p12 export from Keychain Access)
#   How to obtain: Keychain Access → right-click "Developer ID Application: Name (TEAM)"
#                  → Export → save as .p12 with a password
#   How to encode: base64 -i /path/to/cert.p12 | pbcopy
#
# MACOS_CERTIFICATE_PASSWORD
#   The password you set when exporting the .p12 from Keychain Access.
#
# MACOS_SIGNING_IDENTITY
#   The NAME PORTION ONLY of the certificate subject.
#   Correct:   Acme Corp
#   Incorrect: Developer ID Application: Acme Corp (ABC123XYZ7)
#   jpackage uses --mac-signing-key-user-name which expects the name only.
#
# MACOS_KEYCHAIN_PASSWORD
#   Any random string used as the password for the ephemeral CI keychain.
#   Generate: openssl rand -hex 16
#   This keychain is created and deleted on every CI run.
#
# ── Phase 22: macOS Notarization (reserved — not yet used in this workflow) ──
#
# APPLE_ID
#   Apple ID email address of the developer account that owns the certificate.
#
# APPLE_TEAM_ID
#   10-character team identifier from developer.apple.com/account (e.g. ABC123XYZ7)
#
# APPLE_APP_SPECIFIC_PASSWORD
#   App-specific password for the Apple ID.
#   Generate: appleid.apple.com → Sign-In and Security → App-Specific Passwords
#
# =============================================================================
# Full setup guide: docs/SIGNING.md

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  build-jar:
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.version.outputs.app-version }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "app-version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: liberica
          java-version: '21'
          java-package: jdk+fx

      - name: Build fat JAR
        run: ./gradlew shadowJar -Pversion=${{ env.APP_VERSION }}

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: fat-jar
          path: build/libs/xsleditor-*.jar
          retention-days: 1

  package-macos-arm:
    needs: build-jar
    runs-on: macos-15
    env:
      APP_VERSION: ${{ needs.build-jar.outputs.app-version }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: liberica
          java-version: '21'
          java-package: jdk+fx

      - uses: actions/download-artifact@v8.0.1
        with:
          name: fat-jar
          path: dist/

      - name: Compute --app-version for macOS (strip pre-release; major must be >= 1)
        run: |
          VERSION_CLEAN=$(echo "$APP_VERSION" | sed 's/-.*//')
          MAJOR=$(echo "$VERSION_CLEAN" | cut -d. -f1)
          REST=$(echo "$VERSION_CLEAN" | cut -d. -f2-)
          if [ "$MAJOR" = "0" ]; then VERSION_MACOS="1.${REST}"; else VERSION_MACOS="$VERSION_CLEAN"; fi
          echo "VERSION_MACOS=$VERSION_MACOS" >> $GITHUB_ENV

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          # Write cert to a restricted-permission temp dir (not world-readable /tmp directly)
          CERT_DIR=$(mktemp -d)
          chmod 700 "$CERT_DIR"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_DIR/certificate.p12"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security import "$CERT_DIR/certificate.p12" \
            -k build.keychain -f pkcs12 \
            -T /usr/bin/codesign -T /usr/bin/security \
            -P "$MACOS_CERTIFICATE_PASSWORD"
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          # Remove cert immediately after import; cleanup also runs on failure via Delete keychain step
          rm -rf "$CERT_DIR"

      - name: jpackage DMG (arm64, signed)
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          # Guard: fail fast if required signing secrets are not configured
          if [ -z "$MACOS_SIGNING_IDENTITY" ]; then
            echo "ERROR: MACOS_SIGNING_IDENTITY secret is not configured"
            exit 1
          fi
          mkdir -p output
          jpackage \
            --type dmg \
            --name XSLEditor \
            --app-version "$VERSION_MACOS" \
            --input dist/ \
            --main-jar "xsleditor-${APP_VERSION}.jar" \
            --main-class ch.ti.gagi.xsleditor.Launcher \
            --icon src/main/resources/ch/ti/gagi/xsleditor/icon.icns \
            --dest output/ \
            --mac-sign \
            --mac-signing-key-user-name "$MACOS_SIGNING_IDENTITY" \
            --mac-entitlements packaging/entitlements.plist \
            --mac-package-identifier ch.ti.gagi.xsleditor \
            --mac-signing-keychain build.keychain
          mv "output/XSLEditor-${VERSION_MACOS}.dmg" \
             "output/XSLEditor-${APP_VERSION}-arm64.dmg"

      - name: Verify code signature
        run: |
          set -euo pipefail
          # Mount the DMG so we can verify the .app bundle inside
          hdiutil attach "output/XSLEditor-${APP_VERSION}-arm64.dmg" \
            -mountpoint /tmp/xsleditor-verify-arm64 -nobrowse -quiet
          # Verify the .app bundle (this is what codesign signed, not the DMG container)
          codesign --verify --deep --strict --verbose=2 \
            "/tmp/xsleditor-verify-arm64/XSLEditor.app"
          echo "Codesign verification passed"
          # Confirm TeamIdentifier is present and non-empty
          TEAM=$(codesign -dv --verbose=4 "/tmp/xsleditor-verify-arm64/XSLEditor.app" 2>&1 \
            | grep "^TeamIdentifier=" | cut -d= -f2)
          if [ -z "$TEAM" ]; then
            echo "ERROR: TeamIdentifier not found in signature"
            hdiutil detach /tmp/xsleditor-verify-arm64 -quiet || true
            exit 1
          fi
          echo "TeamIdentifier: $TEAM"
          hdiutil detach /tmp/xsleditor-verify-arm64 -quiet

      - name: Notarize DMG (arm64)
        env:
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "ERROR: One or more notarization secrets are not configured"
            echo "Required: APPLE_ID, APPLE_TEAM_ID, APPLE_APP_SPECIFIC_PASSWORD"
            exit 1
          fi
          xcrun notarytool submit "output/XSLEditor-${APP_VERSION}-arm64.dmg" \
            --apple-id  "$APPLE_ID" \
            --team-id   "$APPLE_TEAM_ID" \
            --password  "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait \
            --timeout 300s
          echo "Notarization complete"

      - name: Staple DMG (arm64)
        run: |
          set -euo pipefail
          xcrun stapler staple "output/XSLEditor-${APP_VERSION}-arm64.dmg"
          echo "Staple complete"

      - name: Verify Gatekeeper acceptance (informational, arm64)
        run: |
          # spctl result on CI runner may differ from end-user machine; treat as informational only
          spctl -a -v --type install "output/XSLEditor-${APP_VERSION}-arm64.dmg" 2>&1 || true
          echo "Gatekeeper check complete (informational)"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: dmg-arm64
          path: output/XSLEditor-*-arm64.dmg

      - name: Delete keychain
        if: always()
        run: security delete-keychain build.keychain || true

  package-macos-x64:
    needs: build-jar
    runs-on: macos-15-intel
    env:
      APP_VERSION: ${{ needs.build-jar.outputs.app-version }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: liberica
          java-version: '21'
          java-package: jdk+fx

      - uses: actions/download-artifact@v8.0.1
        with:
          name: fat-jar
          path: dist/

      - name: Compute --app-version for macOS (strip pre-release; major must be >= 1)
        run: |
          VERSION_CLEAN=$(echo "$APP_VERSION" | sed 's/-.*//')
          MAJOR=$(echo "$VERSION_CLEAN" | cut -d. -f1)
          REST=$(echo "$VERSION_CLEAN" | cut -d. -f2-)
          if [ "$MAJOR" = "0" ]; then VERSION_MACOS="1.${REST}"; else VERSION_MACOS="$VERSION_CLEAN"; fi
          echo "VERSION_MACOS=$VERSION_MACOS" >> $GITHUB_ENV

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          # Write cert to a restricted-permission temp dir (not world-readable /tmp directly)
          CERT_DIR=$(mktemp -d)
          chmod 700 "$CERT_DIR"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_DIR/certificate.p12"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security import "$CERT_DIR/certificate.p12" \
            -k build.keychain -f pkcs12 \
            -T /usr/bin/codesign -T /usr/bin/security \
            -P "$MACOS_CERTIFICATE_PASSWORD"
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          # Remove cert immediately after import; cleanup also runs on failure via Delete keychain step
          rm -rf "$CERT_DIR"

      - name: jpackage DMG (x64, signed)
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          # Guard: fail fast if required signing secrets are not configured
          if [ -z "$MACOS_SIGNING_IDENTITY" ]; then
            echo "ERROR: MACOS_SIGNING_IDENTITY secret is not configured"
            exit 1
          fi
          mkdir -p output
          jpackage \
            --type dmg \
            --name XSLEditor \
            --app-version "$VERSION_MACOS" \
            --input dist/ \
            --main-jar "xsleditor-${APP_VERSION}.jar" \
            --main-class ch.ti.gagi.xsleditor.Launcher \
            --icon src/main/resources/ch/ti/gagi/xsleditor/icon.icns \
            --dest output/ \
            --mac-sign \
            --mac-signing-key-user-name "$MACOS_SIGNING_IDENTITY" \
            --mac-entitlements packaging/entitlements.plist \
            --mac-package-identifier ch.ti.gagi.xsleditor \
            --mac-signing-keychain build.keychain
          mv "output/XSLEditor-${VERSION_MACOS}.dmg" \
             "output/XSLEditor-${APP_VERSION}-x64.dmg"

      - name: Verify code signature
        run: |
          set -euo pipefail
          # Mount the DMG so we can verify the .app bundle inside
          hdiutil attach "output/XSLEditor-${APP_VERSION}-x64.dmg" \
            -mountpoint /tmp/xsleditor-verify-x64 -nobrowse -quiet
          # Verify the .app bundle (this is what codesign signed, not the DMG container)
          codesign --verify --deep --strict --verbose=2 \
            "/tmp/xsleditor-verify-x64/XSLEditor.app"
          echo "Codesign verification passed"
          # Confirm TeamIdentifier is present and non-empty
          TEAM=$(codesign -dv --verbose=4 "/tmp/xsleditor-verify-x64/XSLEditor.app" 2>&1 \
            | grep "^TeamIdentifier=" | cut -d= -f2)
          if [ -z "$TEAM" ]; then
            echo "ERROR: TeamIdentifier not found in signature"
            hdiutil detach /tmp/xsleditor-verify-x64 -quiet || true
            exit 1
          fi
          echo "TeamIdentifier: $TEAM"
          hdiutil detach /tmp/xsleditor-verify-x64 -quiet

      - name: Notarize DMG (x64)
        env:
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "ERROR: One or more notarization secrets are not configured"
            echo "Required: APPLE_ID, APPLE_TEAM_ID, APPLE_APP_SPECIFIC_PASSWORD"
            exit 1
          fi
          xcrun notarytool submit "output/XSLEditor-${APP_VERSION}-x64.dmg" \
            --apple-id  "$APPLE_ID" \
            --team-id   "$APPLE_TEAM_ID" \
